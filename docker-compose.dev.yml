services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://flowcrm:flowcrm@db:5432/flowcrm
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: http://evolution-api:8080
      META_APP_SECRET: change-me-in-prod
      META_VERIFY_TOKEN: change-me-in-prod
      JWT_SECRET: dev-secret-change-in-prod
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      BULL_BOARD_USER: admin
      BULL_BOARD_PASS: dev-secret-bullboard
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_DB: flowcrm
      POSTGRES_USER: flowcrm
      POSTGRES_PASSWORD: flowcrm
    volumes:
      - flowcrm_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcrm -d flowcrm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  evolution-api:
    image: atendai/evolution-api:latest
    environment:
      AUTHENTICATION_API_KEY: dev-evolution-key
      DATABASE_ENABLED: 'false'
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  flowcrm_db:
