version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://flowcrm:flowcrm@db:5432/flowcrm
      JWT_SECRET: dev-secret-change-in-prod
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: flowcrm
      POSTGRES_USER: flowcrm
      POSTGRES_PASSWORD: flowcrm
    volumes:
      - flowcrm_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  flowcrm_db:
