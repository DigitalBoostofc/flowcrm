name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (test + typecheck + audit)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_DB: flowcrm_test
          POSTGRES_USER: flowcrm
          POSTGRES_PASSWORD: flowcrm
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U flowcrm -d flowcrm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: TypeScript check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Unit tests
        working-directory: backend
        run: npm test -- --passWithNoTests --ci
        env:
          NODE_ENV: test

      - name: Run migrations (e2e schema)
        working-directory: backend
        run: npm run migration:run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://flowcrm:flowcrm@localhost:5432/flowcrm_test

      - name: Seed owner user (e2e fixture)
        working-directory: backend
        run: npm run seed
        env:
          NODE_ENV: test
          RUN_MIGRATIONS_ON_BOOT: 'false'
          DATABASE_URL: postgresql://flowcrm:flowcrm@localhost:5432/flowcrm_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-32-bytes-of-random-data
          JWT_EXPIRES_IN: 1h
          FRONTEND_URL: http://localhost:5173
          META_APP_SECRET: ci-test
          META_VERIFY_TOKEN: ci-test
          OWNER_EMAIL: owner@flowcrm.com
          OWNER_PASSWORD: flowcrm123

      - name: E2E tests
        working-directory: backend
        run: npm run test:e2e -- --passWithNoTests --ci
        env:
          NODE_ENV: test
          RUN_MIGRATIONS_ON_BOOT: 'false'
          DATABASE_URL: postgresql://flowcrm:flowcrm@localhost:5432/flowcrm_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-32-bytes-of-random-data
          JWT_EXPIRES_IN: 1h
          FRONTEND_URL: http://localhost:5173
          META_APP_SECRET: ci-test
          META_VERIFY_TOKEN: ci-test

      - name: NPM audit (production deps)
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend (typecheck + build + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build (typecheck + bundle)
        working-directory: frontend
        run: npm run build

      - name: NPM audit (production deps)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: flowcrm-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: flowcrm-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
